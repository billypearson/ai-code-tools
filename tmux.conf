unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind '"'
unbind %
unbind &
unbind c
unbind d
unbind n
unbind p
unbind s
unbind w
unbind x
unbind z
unbind ,
unbind .
unbind /
unbind 0
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9

bind n command-prompt -p "new session name:" "new-session -A -s '%%'"
bind s choose-session
bind d detach-client
bind r source-file ~/.tmux.conf \; display-message "reloaded"

set -g mouse off
set -g history-limit 20000